[build]
target = "xtensa-esp32-none-elf"

[target.xtensa-esp32-none-elf]
# `--ignore-app-descriptor` — we're bare-metal esp-hal, not esp-idf, so the
# IDF app-descriptor that espflash 4.x looks for is intentionally absent.
runner = "espflash flash --monitor --ignore-app-descriptor"

rustflags = [
    "-C", "link-arg=-Tlinkall.x",
    "-C", "link-arg=-nostartfiles",
]

[unstable]
build-std = ["alloc", "core"]

[env]
ESP_LOG = "info"
# Compile-time secrets — override before `cargo build`, or place in a
# .cargo/config.local.toml and source it from your shell.
# wifi.rs reads env!("ESP32") and env!("14310324") — keep names in sync.
ESP32        = "ESP32"
"14310324"   = "14310324"
MQTT_HOST    = "192.168.0.10"   # Windows host (WiFi adapter) running mosquitto
MQTT_PORT    = "1883"
MQTT_CLIENT_ID = "kc868-a6"
